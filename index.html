<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kukoro Dungeon Raid Player Data Tool</title>

<style>
  :root {
    --bg: #0f1117;
    --panel: #161923;
    --panel-2: #1c2030;
    --border: #2a2f3f;
    --text: #e6e8f0;
    --text-dim: #8b90a3;
    --accent: #7c5cff;
    --accent-2: #ff6b6b;
    --success: #35d68f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(124,92,255,0.10), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,107,107,0.08), transparent 40%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
    min-height: 100vh;
  }

  .app {
    width: 100%;
    max-width: 1080px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    display: flex;
    flex-direction: column;
  }

  .title-bar {
    padding: 22px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(180deg, rgba(124,92,255,0.08), transparent);
  }

  .title-bar .mark {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .title-bar h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .title-bar .sub {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'SFMono-Regular', Consolas, monospace;
  }

  .main-area {
    display: flex;
  }

  .sidebar {
    width: 280px;
    padding: 20px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: 760px;
    background: var(--panel);
  }

  .section {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .field-label .value {
    color: var(--text);
    font-weight: 700;
    text-transform: none;
    letter-spacing: 0;
    margin-left: 6px;
  }

  textarea, input {
    display: block;
    width: 100%;
    background: #0e1119;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    margin-bottom: 10px;
  }

  textarea { height: 64px; }

  textarea::placeholder, input::placeholder { color: #565c72; }

  textarea:focus, input:focus, button:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,255,0.25);
  }

  button {
    display: block;
    width: 100%;
    padding: 9px 0;
    background: #232838;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease, border-color 0.15s ease;
    margin-bottom: 8px;
  }

  button:last-child { margin-bottom: 0; }

  button:hover {
    background: #2a3044;
    border-color: #3a4159;
  }

  button:active {
    transform: translateY(1px);
  }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  button.primary:hover {
    background: #6c4cf0;
  }

  button.ghost {
    background: transparent;
    border-color: transparent;
    color: var(--accent);
    font-weight: 600;
  }

  button.ghost:hover {
    background: rgba(124,92,255,0.1);
  }

  button.danger:hover {
    border-color: var(--accent-2);
    color: var(--accent-2);
  }

  .button-row {
    display: flex;
    gap: 8px;
  }

  .button-row button {
    margin-bottom: 0;
  }

  .icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    padding: 0;
    margin: 0 0 0 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }

  .icon-btn:hover {
    color: var(--text);
    border-color: var(--accent);
    background: rgba(124,92,255,0.1);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    width: 320px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .modal-header h2 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
  }

  .modal .section {
    margin-bottom: 12px;
  }

  .modal .section:last-child {
    margin-bottom: 0;
  }

  select {
    display: block;
    width: 100%;
    background: #0e1119;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
  }

  select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,255,0.25);
  }

  .content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    display: inline-block;
    width: auto;
    margin: 0;
    padding: 8px 16px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    color: var(--text-dim);
    font-weight: 600;
  }

  .tab-btn:hover {
    background: rgba(124,92,255,0.08);
    color: var(--text);
  }

  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .panel {
    display: none;
    flex: 1;
  }

  .panel.active {
    display: block;
  }

  .chat-name {
    color: var(--accent-2);
    font-weight: 700;
    margin-right: 4px;
  }

  .board {
    height: 720px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    background: #0e1119;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .board:empty::before {
    content: "No players yet — they'll appear here once detected in chat or added manually.";
    color: var(--text-dim);
    font-size: 13px;
  }

  .board-header, .player-row {
    display: grid;
    grid-template-columns: 90px 50px 130px 80px 70px 1.6fr;
    gap: 14px;
    align-items: center;
  }

  .board-header {
    padding: 0 14px 8px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
  }

  .sort-header {
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s ease;
  }

  .sort-header:hover {
    color: var(--text);
  }

  .sort-header.active {
    color: var(--accent);
  }

  .sort-arrow {
    font-size: 9px;
    line-height: 1;
    width: 8px;
    display: inline-block;
  }

  .player-row {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .player-row .player-name {
    color: var(--accent-2);
    font-weight: 700;
    font-size: 13px;
  }

  .player-row .player-level {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .player-row .player-stats {
    font-size: 12px;
    color: var(--text-dim);
  }

  .player-row .player-role {
    font-size: 13px;
  }

  .player-row .player-focus {
    font-size: 12px;
    color: var(--success);
    text-transform: capitalize;
  }

  .player-row .player-skills {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
  }

  .player-row .player-skills .skill-num {
    color: var(--accent);
    font-weight: 600;
    margin-right: 4px;
  }

  .player-row .player-skills .skill-item {
    padding: 3px 5px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .player-row .player-skills .skill-item + .skill-item {
    margin-top: 3px;
  }

  .player-row .player-skills .skill-item:hover {
    background: rgba(255,255,255,0.06);
  }

  .player-row .player-skills .skill-item.skill-red {
    color: var(--accent-2);
    background: rgba(255,107,107,0.12);
  }

  .player-row .player-skills .skill-item.skill-red:hover {
    background: rgba(255,107,107,0.2);
  }

  .player-row .player-skills .skill-item.skill-green {
    color: var(--success);
    background: rgba(53,214,143,0.12);
  }

  .player-row .player-skills .skill-item.skill-green:hover {
    background: rgba(53,214,143,0.2);
  }

  .add-row-trigger {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 14px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }

  .add-row-trigger:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(124,92,255,0.08);
  }

  .add-row-trigger .plus-icon {
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
  }

  .player-row.add-row {
    border-color: var(--accent);
    align-items: start;
  }

  .add-row .add-input {
    background: #0e1119;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 12px;
    width: 100%;
    margin: 0;
  }

  .add-row .add-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(124,92,255,0.25);
  }

  .add-skills-cell {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .add-skills-cell textarea {
    background: #0e1119;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 12px;
    width: 100%;
    height: 48px;
    margin: 0;
    resize: vertical;
  }

  .add-skills-cell textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(124,92,255,0.25);
  }

  .add-row-actions {
    display: flex;
    gap: 6px;
  }

  .add-row-actions button {
    margin: 0;
    padding: 5px 0;
    font-size: 12px;
  }

  .add-row-actions button.danger:hover {
    border-color: var(--accent-2);
    color: var(--accent-2);
  }

  .chat {
    height: 720px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    background: #0e1119;
  }

  .chat:empty::before {
    content: "No raid messages yet — connect a channel to start listening.";
    color: var(--text-dim);
    font-size: 13px;
  }

  .msg {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: var(--panel-2);
    border: 1px solid var(--border);
  }

  .tag {
    color: var(--success);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.3px;
    font-family: 'SFMono-Regular', Consolas, monospace;
  }

  .name {
    color: var(--accent);
    font-weight: 600;
  }

  .msg .text {
    color: var(--text);
  }

  .footer {
    text-align: center;
    padding: 14px;
    font-size: 12px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
  }

  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  .footer a:hover {
    text-decoration: underline;
  }

  .sidebar::-webkit-scrollbar, .chat::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-thumb, .chat::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
</style>
</head>

<body>

<div class="app">

  <div class="title-bar">
    <div class="mark"></div>
    <h1>Kukoro Dungeon Raid Player Data Tool</h1>
    <div class="sub" id="statusText">disconnected</div>
    <button class="icon-btn" onclick="openSettings()" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <div class="main-area">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <div class="section">
        <div class="field-label">Twitch Channel</div>
        <input id="channelInput" type="text" placeholder="channel name">
        <button class="primary" onclick="connect()">Connect Chat</button>
        <div class="button-row">
          <button class="danger" onclick="disconnect()">Disconnect</button>
          <button class="danger" onclick="resetTool()">Clear</button>
        </div>
      </div>

      <div class="section">
        <div class="field-label">Boss Race</div>
        <button onclick="setBossRace()">Set</button>
      </div>

      <div class="section">
        <div class="field-label">Organize by <span class="value">Players</span></div>
        <button onclick="organizeBy('players')">Targets</button>
      </div>

      <div class="section">
        <div class="field-label">Player Data</div>
        <textarea id="playerDataInput" placeholder="Paste raid messages (or plain names), one per line..."></textarea>
        <button class="ghost" style="background:rgba(124,92,255,0.1)" onclick="addPlayersFromTextarea()">Add Players</button>

      </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="content">
      <div class="tabs">
        <button class="tab-btn active" id="tabBtnChat" onclick="switchTab('chat')">Chat</button>
        <button class="tab-btn" id="tabBtnBoard" onclick="switchTab('board')">Board</button>
      </div>

      <div id="chatPanel" class="panel active">
        <div id="chat" class="chat"></div>
      </div>

      <div id="boardPanel" class="panel">
        <div class="board-header">
          <div class="sort-header" id="sortHeader-name" onclick="toggleSort('name')">Player<span class="sort-arrow"></span></div>
          <div class="sort-header" id="sortHeader-level" onclick="toggleSort('level')">Level<span class="sort-arrow"></span></div>
          <div>Stats</div>
          <div class="sort-header" id="sortHeader-role" onclick="toggleSort('role')">Role<span class="sort-arrow"></span></div>
          <div class="sort-header" id="sortHeader-focus" onclick="toggleSort('focus')">Focus<span class="sort-arrow"></span></div>
          <div>Skills</div>
        </div>
        <div id="board" class="board"></div>
      </div>
    </div>

  </div>

  <div class="footer">
    See "<a href="#" onclick="readMe(); return false;">Read Me</a>" for Copyright &amp; Permissions.
  </div>

</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsOverlay" onclick="if(event.target===this) closeSettings()">
  <div class="modal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="icon-btn" onclick="closeSettings()" aria-label="Close settings">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="section">
      <div class="field-label">Theme</div>
      <button onclick="toggleDarkMode()">Toggle Theme</button>
    </div>

    <div class="section">
      <div class="field-label">Language</div>
      <select id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ja">日本語</option>
      </select>
    </div>
  </div>
</div>

<script>
let ws;
let manualDisconnect = false;
let participants = new Map(); // name -> { stats, role, skills }
let sortMode = "name-asc";
let addingRow = false;

/* ORIGINAL CHAT LOGIC (UNCHANGED) */
function connect() {
  const channel = document.getElementById("channelInput").value.trim().toLowerCase();
  if (!channel) return;

  // Close any existing connection first — otherwise reconnecting (or
  // double-clicking Connect) leaves two sockets open, and every message
  // gets rendered twice, once per socket.
  if (ws) {
    ws.onclose = null; // don't let the old socket's onclose overwrite our new status text
    ws.close();
    ws = null;
  }
  manualDisconnect = false;

  const chatBox = document.getElementById("chat");
  document.getElementById("statusText").textContent = "connecting to #" + channel + "…";

  ws = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

  ws.onopen = () => {
    ws.send("CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership");
    ws.send("NICK justinfan" + Math.floor(Math.random() * 100000));
    ws.send("JOIN #" + channel);
    document.getElementById("statusText").textContent = "connected — #" + channel;
  };

  ws.onclose = () => {
    if (!manualDisconnect) {
      document.getElementById("statusText").textContent = "disconnected (connection dropped)";
    }
    manualDisconnect = false;
  };

  ws.onmessage = (event) => {
    // Twitch can pack multiple IRC lines into one WebSocket message,
    // separated by CRLF — split them out and handle each individually.
    const lines = event.data.split("\r\n").filter(line => line.length > 0);

    for (const line of lines) {

      // Twitch periodically sends PING; we must reply with PONG or it
      // will drop the connection after a timeout.
      if (line.startsWith("PING")) {
        ws.send("PONG :tmi.twitch.tv");
        continue;
      }

      if (!line.includes("PRIVMSG")) continue;

      const userMatch = line.match(/display-name=([^;]+)/);
      const textMatch = line.match(/PRIVMSG #[^ ]+ :(.*)/);

      const username = userMatch ? userMatch[1] : "Unknown";
      const text = textMatch ? textMatch[1] : "";

      // Twitch (and bots relaying into it) will sometimes append an
      // invisible character — a zero-width space/joiner, or a Unicode
      // "tag" character (U+E0000–U+E007F) — to an otherwise-identical
      // message so Twitch's duplicate-message filter doesn't drop it.
      // That trailing character is invisible in chat but breaks strict
      // regexes anchored to the end of the string, so we strip it here
      // before any parsing happens.
      const cleanedText = text
        .replace(/\u0001/g, "")
        .replace(/^ACTION\s+/, "")
        .replace(/[\u200B-\u200F\uFEFF\u2060-\u206F]|[\u{E0000}-\u{E007F}]/gu, "")
        .trim();

      if (cleanedText.toUpperCase().includes("[KUKORO]")) {

        const cleaned = cleanedText
          .replace(/\[KUKORO\]/i, "")
          .trim();

        const nameMatch = cleaned.match(/^(\S+)/);
        const name = nameMatch ? nameMatch[1] : "Unknown";
        const restText = cleaned.slice(name.length);

        const div = document.createElement("div");
        div.className = "msg";

        div.innerHTML =
          `<span class="chat-name">${escapeHtml(name)}</span>` +
          `<span class="text">${escapeHtml(restText)}</span>`;

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;

        // Dropped the trailing "$" anchor — it required the switch message
        // to end exactly at "focus to X" with nothing else after it, which
        // is exactly the kind of match a stray leftover character (or
        // extra trailing punctuation) would silently break.
        const focusMatch = cleaned.match(/^(\S+)\s+has switched focus to\s+([^.]+)\.?/i);

        if (focusMatch) {
          handleFocusSwitch(focusMatch[1], focusMatch[2].trim());
        } else if (cleaned.includes("(") && cleaned.includes("[")) {
          // Only treat it as a full stats announcement if it actually looks
          // like one (has the stats parens AND at least one skill bracket).
          // Previously ANY unrecognized [KUKORO] message — including a
          // focus-switch line whose regex failed to match for any reason —
          // fell through to here and got parsed as a stats message. Since a
          // message like "X has switched focus to Y." has no "(" or "[", it
          // parsed to an almost-empty record, and upsertParticipant() would
          // silently overwrite (wipe) that player's real stats/role/skills.
          const parsed = parseKukoroMessage(cleaned);
          upsertParticipant(parsed);
        } else {
          console.warn("Unrecognized [KUKORO] message, ignoring so it can't wipe existing data:", cleaned);
        }
      }
    }
  };
}

function parseKukoroMessage(text) {
  // Example: DAMR66 (Lv. 18, Df. 15%, Crit. 20%, Agi. 15%) > 🗡️ Rogue
  // [ skill one ] and [ skill two ].
  const nameMatch = text.match(/^(\S+)/);
  const name = nameMatch ? nameMatch[1] : "Unknown";

  const statsMatch = text.match(/\(([^)]*)\)/);
  let stats = statsMatch ? statsMatch[1].trim() : "";

  // Level lives inside the stats parens (e.g. "Lv. 18, Df. 15%, ...") but
  // gets its own board column, so pull it out and tidy up what's left.
  let level = "";
  const levelMatch = stats.match(/Lv\.?\s*(\d+)/i);
  if (levelMatch) {
    level = levelMatch[1];
    stats = stats
      .replace(levelMatch[0], "")
      .replace(/^\s*,\s*|\s*,\s*$/g, "")
      .trim();
  }

  // Role sits between the stats parentheses and the first skill bracket,
  // after a ">" marker — but a player may have no role at all.
  let role = "";
  const afterStatsIndex = statsMatch ? statsMatch.index + statsMatch[0].length : name.length;
  const firstBracketIndex = text.indexOf("[");
  if (firstBracketIndex > afterStatsIndex) {
    let segment = text.slice(afterStatsIndex, firstBracketIndex).trim();
    if (segment.startsWith(">")) {
      segment = segment.slice(1).trim();
    }
    role = segment;
  }

  // Capture each skill along with its position, so we can inspect the word
  // sitting between two skills (e.g. "and" vs "but") to tell whether the
  // second one is a downside rather than a bonus.
  const skillMatches = [];
  const skillRegex = /\[\s*([^\]]*?)\s*\]/g;
  let m;
  while ((m = skillRegex.exec(text)) !== null) {
    skillMatches.push({ text: m[1].trim(), start: m.index, end: m.index + m[0].length });
  }

  const skills = skillMatches.map((match, i) => {
    // "but" between two skills signals the following skill is a drawback,
    // not a bonus — highlight it red automatically. "and" (or anything
    // else) leaves it unhighlighted; the player can still override this
    // manually by clicking the skill on the board.
    let highlight = "none";
    if (i > 0) {
      const connector = text.slice(skillMatches[i - 1].end, match.start);
      if (/\bbut\b/i.test(connector)) {
        highlight = "red";
      }
    }
    return { text: match.text, highlight };
  });

  // Track the creature currently being targeted (e.g. "lizard" from
  // "enemy lizard"), so a later focus-switch message knows what to replace.
  let focus = null;
  for (const skill of skills) {
    const fm = skill.text.match(/enemy (\w+)/i);
    if (fm) { focus = fm[1].toLowerCase(); break; }
  }

  return { name, level, stats, role, skills, focus };
}

function upsertParticipant(parsed) {
  participants.set(parsed.name, {
    level: parsed.level,
    stats: parsed.stats,
    role: parsed.role,
    skills: parsed.skills,
    focus: parsed.focus
  });
  renderBoard();
}

function handleFocusSwitch(name, newCreature) {
  if (participants.has(name)) {
    const player = participants.get(name);

    if (player.focus) {
      const escaped = player.focus.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const regex = new RegExp(escaped, "gi");
      player.skills = player.skills.map(s => ({ text: s.text.replace(regex, newCreature), highlight: s.highlight }));
    }

    player.focus = newCreature.toLowerCase();
    participants.set(name, player);
  } else {
    // Player hasn't posted full stats yet — just note what they're focusing.
    participants.set(name, {
      level: "",
      stats: "",
      role: "",
      skills: [{ text: `Focuses ${newCreature}`, highlight: "none" }],
      focus: newCreature.toLowerCase()
    });
  }

  renderBoard();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function disconnect() {
  if (!ws) {
    document.getElementById("statusText").textContent = "disconnected";
    return;
  }
  manualDisconnect = true;
  ws.close();
  ws = null;
  document.getElementById("statusText").textContent = "disconnected";
}

/* BUTTON FUNCTIONS */
function resetTool() {
  document.getElementById("chat").innerHTML = "";
  participants.clear();
  renderBoard();
}

function switchTab(tab) {
  const chatPanel = document.getElementById("chatPanel");
  const boardPanel = document.getElementById("boardPanel");
  const tabBtnChat = document.getElementById("tabBtnChat");
  const tabBtnBoard = document.getElementById("tabBtnBoard");

  if (tab === "board") {
    chatPanel.classList.remove("active");
    boardPanel.classList.add("active");
    tabBtnChat.classList.remove("active");
    tabBtnBoard.classList.add("active");
  } else {
    boardPanel.classList.remove("active");
    chatPanel.classList.add("active");
    tabBtnBoard.classList.remove("active");
    tabBtnChat.classList.add("active");
  }
}

function addPlayersFromTextarea() {
  const input = document.getElementById("playerDataInput");
  const lines = input.value.split("\n").map(n => n.trim()).filter(n => n.length > 0);

  lines.forEach(line => {
    // Strip an optional leading [KUKORO] tag, same as the live chat parser does.
    const cleaned = line.replace(/\[KUKORO\]/i, "").trim();

    if (cleaned.includes("(") && cleaned.includes("[")) {
      // Looks like a full raid announcement (stats parens + at least one
      // skill bracket) — reuse the exact same parser the chat listener
      // uses, so a pasted message ends up identical to one heard live.
      const parsed = parseKukoroMessage(cleaned);
      upsertParticipant(parsed);
    } else {
      // Otherwise treat it as a bare name, same as before — and never
      // clobber an existing player's real data with a blank entry.
      const nameMatch = cleaned.match(/^(\S+)/);
      const name = nameMatch ? nameMatch[1] : cleaned;
      if (name && !participants.has(name)) {
        participants.set(name, { level: "", stats: "", role: "", skills: [], focus: null });
      }
    }
  });
  renderBoard();

  input.value = "";
  switchTab("board");
}

function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  updateSortHeaders();

  const [field, direction] = sortMode.split("-");
  const dir = direction === "desc" ? -1 : 1;

  const sortedNames = Array.from(participants.keys()).sort((a, b) => {
    const dataA = participants.get(a);
    const dataB = participants.get(b);
    let result = 0;

    if (field === "name") {
      result = a.localeCompare(b);
    } else if (field === "level") {
      // Missing/non-numeric levels sort to the bottom regardless of direction.
      const numA = parseInt(dataA.level, 10);
      const numB = parseInt(dataB.level, 10);
      const validA = !isNaN(numA);
      const validB = !isNaN(numB);
      if (!validA && !validB) result = 0;
      else if (!validA) return 1;
      else if (!validB) return -1;
      else result = numA - numB;
    } else if (field === "role") {
      result = (dataA.role || "").localeCompare(dataB.role || "");
    } else if (field === "focus") {
      result = (dataA.focus || "").localeCompare(dataB.focus || "");
    }

    // Tie-break by name (always ascending) so equal values stay stable and predictable.
    if (result === 0) return a.localeCompare(b);
    return result * dir;
  });

  sortedNames.forEach(name => {
    const data = participants.get(name);
    const row = document.createElement("div");
    row.className = "player-row";

    const skillsHtml = data.skills.length
      ? data.skills.map((s, i) => {
          const highlightClass = s.highlight === "red" ? " skill-red" : s.highlight === "green" ? " skill-green" : "";
          return `<div class="skill-item${highlightClass}" data-name="${escapeHtml(name)}" data-index="${i}" title="Click to highlight red/green"><span class="skill-num">${i + 1}.</span>${escapeHtml(s.text)}</div>`;
        }).join("")
      : "—";

    row.innerHTML = `
      <div class="player-name">${escapeHtml(name)}</div>
      <div class="player-level">${escapeHtml(data.level) || "—"}</div>
      <div class="player-stats">${escapeHtml(data.stats) || "—"}</div>
      <div class="player-role">${escapeHtml(data.role) || "—"}</div>
      <div class="player-focus">${escapeHtml(data.focus) || "Unknown"}</div>
      <div class="player-skills">${skillsHtml}</div>
    `;

    board.appendChild(row);
  });

  if (addingRow) {
    board.appendChild(buildAddRowForm());
  } else {
    const trigger = document.createElement("div");
    trigger.className = "add-row-trigger";
    trigger.innerHTML = `<span class="plus-icon">+</span> Add Player`;
    trigger.onclick = showAddRow;
    board.appendChild(trigger);
  }
}

function buildAddRowForm() {
  const row = document.createElement("div");
  row.className = "player-row add-row";

  row.innerHTML = `
    <input class="add-input" id="addRowName" type="text" placeholder="Player name">
    <input class="add-input" id="addRowLevel" type="text" inputmode="numeric" placeholder="Level" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    <input class="add-input" id="addRowStats" type="text" placeholder="Stats">
    <input class="add-input" id="addRowRole" type="text" placeholder="Role">
    <input class="add-input" id="addRowFocus" type="text" placeholder="Focus">
    <div class="add-skills-cell">
      <textarea id="addRowSkills" placeholder="Skills, one per line..."></textarea>
      <div class="add-row-actions">
        <button class="ghost" style="background:rgba(124,92,255,0.1)" onclick="saveNewRow()">Save</button>
        <button class="ghost danger" onclick="cancelAddRow()">Cancel</button>
      </div>
    </div>
  `;

  return row;
}

function showAddRow() {
  addingRow = true;
  renderBoard();
  const nameInput = document.getElementById("addRowName");
  if (nameInput) nameInput.focus();
}

function cancelAddRow() {
  addingRow = false;
  renderBoard();
}

function saveNewRow() {
  const name = document.getElementById("addRowName").value.trim();
  if (!name) {
    document.getElementById("addRowName").focus();
    return;
  }

  const level = document.getElementById("addRowLevel").value.trim();
  const stats = document.getElementById("addRowStats").value.trim();
  const role = document.getElementById("addRowRole").value.trim();
  const focusRaw = document.getElementById("addRowFocus").value.trim();
  const focus = focusRaw ? focusRaw.toLowerCase() : null;
  const skills = document.getElementById("addRowSkills").value
    .split("\n")
    .map(s => s.trim())
    .filter(s => s.length > 0)
    .map(text => ({ text, highlight: "none" }));

  participants.set(name, { level, stats, role, skills, focus });

  addingRow = false;
  renderBoard();
}

function openSettings() {
  document.getElementById("settingsOverlay").classList.add("open");
}

function closeSettings() {
  document.getElementById("settingsOverlay").classList.remove("open");
}

function changeLanguage(lang) {
  // Placeholder — wire this up to real translations when copy is ready.
  alert("Language set to: " + lang + " (translations not yet implemented)");
}

function toggleDarkMode() {
  alert("This tool now ships dark by default — light mode coming soon.");
}

function readMe() {
  alert("Kukoro Dungeon Raid Tool - Read Me placeholder");
}

function setBossRace() {
  alert("Boss Race set (placeholder)");
}

function organizeBy(type) {
  alert("Organize by: " + type);
}

function toggleSort(field) {
  const [currentField, currentDirection] = sortMode.split("-");
  if (currentField === field) {
    // Clicking the same column again flips the direction.
    sortMode = field + "-" + (currentDirection === "asc" ? "desc" : "asc");
  } else {
    // Switching to a new column starts fresh at ascending.
    sortMode = field + "-asc";
  }
  renderBoard();
}

function updateSortHeaders() {
  const [field, direction] = sortMode.split("-");
  ["name", "level", "role", "focus"].forEach(f => {
    const header = document.getElementById("sortHeader-" + f);
    if (!header) return;
    const arrow = header.querySelector(".sort-arrow");
    if (f === field) {
      header.classList.add("active");
      arrow.textContent = direction === "asc" ? "▲" : "▼";
    } else {
      header.classList.remove("active");
      arrow.textContent = "";
    }
  });
}

function toggleSkillHighlight(name, index) {
  if (!participants.has(name)) return;
  const player = participants.get(name);
  if (!player.skills[index]) return;

  // Cycle: none -> red -> green -> none, so players can mark a skill as a
  // downside (red) or an upside (green) regardless of how it was parsed.
  const current = player.skills[index].highlight || "none";
  const next = current === "none" ? "red" : current === "red" ? "green" : "none";
  player.skills[index].highlight = next;
  participants.set(name, player);
  renderBoard();
}

// Single delegated listener for skill clicks — attached once here rather
// than re-attached inside renderBoard(), since #board itself is never
// replaced (only its contents are re-rendered) and re-adding a listener
// on every render would stack duplicate handlers.
document.getElementById("board").addEventListener("click", (e) => {
  const item = e.target.closest(".skill-item");
  if (!item) return;
  const name = item.dataset.name;
  const index = parseInt(item.dataset.index, 10);
  toggleSkillHighlight(name, index);
});

// Render once on load so the "+ Add Player" trigger shows immediately,
// even before any data has come in from chat or been added manually.
renderBoard();

</script>
