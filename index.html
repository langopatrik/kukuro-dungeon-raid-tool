<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kukoro Dungeon Raid Player Data Tool</title>

<style>
  :root {
    --bg: #0f1117;
    --panel: #161923;
    --panel-2: #1c2030;
    --border: #2a2f3f;
    --text: #e6e8f0;
    --text-dim: #8b90a3;
    --accent: #7c5cff;
    --accent-2: #ff6b6b;
    --success: #35d68f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(124,92,255,0.10), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,107,107,0.08), transparent 40%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
    min-height: 100vh;
  }

  .app {
    width: 100%;
    max-width: 1080px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    display: flex;
    flex-direction: column;
  }

  .title-bar {
    padding: 22px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(180deg, rgba(124,92,255,0.08), transparent);
  }

  .title-bar .mark {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .title-bar h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .title-bar .sub {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'SFMono-Regular', Consolas, monospace;
  }

  .main-area {
    display: flex;
  }

  .sidebar {
    width: 280px;
    padding: 20px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: 760px;
    background: var(--panel);
  }

  .section {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .field-label .value {
    color: var(--text);
    font-weight: 700;
    text-transform: none;
    letter-spacing: 0;
    margin-left: 6px;
  }

  textarea, input {
    display: block;
    width: 100%;
    background: #0e1119;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    margin-bottom: 10px;
  }

  textarea { height: 64px; }

  textarea::placeholder, input::placeholder { color: #565c72; }

  textarea:focus, input:focus, button:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,255,0.25);
  }

  button {
    display: block;
    width: 100%;
    padding: 9px 0;
    background: #232838;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease, border-color 0.15s ease;
    margin-bottom: 8px;
  }

  button:last-child { margin-bottom: 0; }

  button:hover {
    background: #2a3044;
    border-color: #3a4159;
  }

  button:active {
    transform: translateY(1px);
  }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  button.primary:hover {
    background: #6c4cf0;
  }

  button.ghost {
    background: transparent;
    border-color: transparent;
    color: var(--accent);
    font-weight: 600;
  }

  button.ghost:hover {
    background: rgba(124,92,255,0.1);
  }

  button.danger:hover {
    border-color: var(--accent-2);
    color: var(--accent-2);
  }

  .button-row {
    display: flex;
    gap: 8px;
  }

  .button-row button {
    margin-bottom: 0;
  }

  .icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    padding: 0;
    margin: 0 0 0 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }

  .icon-btn:hover {
    color: var(--text);
    border-color: var(--accent);
    background: rgba(124,92,255,0.1);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    width: 320px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .modal-header h2 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
  }

  .modal .section {
    margin-bottom: 12px;
  }

  .modal .section:last-child {
    margin-bottom: 0;
  }

  select {
    display: block;
    width: 100%;
    background: #0e1119;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
  }

  select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,255,0.25);
  }

  .content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    display: inline-block;
    width: auto;
    margin: 0;
    padding: 8px 16px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    color: var(--text-dim);
    font-weight: 600;
  }

  .tab-btn:hover {
    background: rgba(124,92,255,0.08);
    color: var(--text);
  }

  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .panel {
    display: none;
    flex: 1;
  }

  .panel.active {
    display: block;
  }

  .chat-name {
    color: var(--accent-2);
    font-weight: 700;
    margin-right: 4px;
  }

  .board {
    height: 720px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    background: #0e1119;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .board:empty::before {
    content: "No players yet — they'll appear here once detected in chat or added manually.";
    color: var(--text-dim);
    font-size: 13px;
  }

  .board-header, .player-row {
    display: grid;
    grid-template-columns: 120px 200px 140px 1fr;
    gap: 14px;
    align-items: center;
  }

  .board-header {
    padding: 0 14px 8px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
  }

  .player-row {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .player-row .player-name {
    color: var(--accent-2);
    font-weight: 700;
    font-size: 13px;
  }

  .player-row .player-stats {
    font-size: 12px;
    color: var(--text-dim);
  }

  .player-row .player-role {
    font-size: 13px;
  }

  .player-row .player-skills {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
  }

  .player-row .player-skills .skill-num {
    color: var(--accent);
    font-weight: 600;
    margin-right: 4px;
  }

  .chat {
    height: 720px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    background: #0e1119;
  }

  .chat:empty::before {
    content: "No raid messages yet — connect a channel to start listening.";
    color: var(--text-dim);
    font-size: 13px;
  }

  .msg {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: var(--panel-2);
    border: 1px solid var(--border);
  }

  .tag {
    color: var(--success);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.3px;
    font-family: 'SFMono-Regular', Consolas, monospace;
  }

  .name {
    color: var(--accent);
    font-weight: 600;
  }

  .msg .text {
    color: var(--text);
  }

  .footer {
    text-align: center;
    padding: 14px;
    font-size: 12px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
  }

  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  .footer a:hover {
    text-decoration: underline;
  }

  .sidebar::-webkit-scrollbar, .chat::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-thumb, .chat::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
</style>
</head>

<body>

<div class="app">

  <div class="title-bar">
    <div class="mark"></div>
    <h1>Kukoro Dungeon Raid Player Data Tool</h1>
    <div class="sub" id="statusText">disconnected</div>
    <button class="icon-btn" onclick="openSettings()" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <div class="main-area">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <div class="section">
        <div class="field-label">Twitch Channel</div>
        <input id="channelInput" type="text" placeholder="channel name">
        <button class="primary" onclick="connect()">Connect Chat</button>
        <div class="button-row">
          <button class="danger" onclick="disconnect()">Disconnect</button>
          <button class="danger" onclick="resetTool()">Clear</button>
        </div>
      </div>

      <div class="section">
        <div class="field-label">Boss Race</div>
        <button onclick="setBossRace()">Set</button>
      </div>

      <div class="section">
        <div class="field-label">Organize by <span class="value">Players</span></div>
        <button onclick="organizeBy('players')">Targets</button>
      </div>

      <div class="section">
        <div class="field-label">Sort by <span class="value">Name</span></div>
        <button onclick="sortBy('name')">Level</button>
      </div>

      <div class="section">
        <div class="field-label">Player Data</div>
        <textarea id="playerDataInput" placeholder="Paste player names, one per line..."></textarea>
        <button class="ghost" style="background:rgba(124,92,255,0.1)" onclick="addPlayersFromTextarea()">Add Players</button>
      </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="content">
      <div class="tabs">
        <button class="tab-btn active" id="tabBtnChat" onclick="switchTab('chat')">Chat</button>
        <button class="tab-btn" id="tabBtnBoard" onclick="switchTab('board')">Board</button>
      </div>

      <div id="chatPanel" class="panel active">
        <div id="chat" class="chat"></div>
      </div>

      <div id="boardPanel" class="panel">
        <div class="board-header">
          <div>Player</div>
          <div>Stats</div>
          <div>Role</div>
          <div>Skills</div>
        </div>
        <div id="board" class="board"></div>
      </div>
    </div>

  </div>

  <div class="footer">
    See "<a href="#" onclick="readMe(); return false;">Read Me</a>" for Copyright &amp; Permissions.
  </div>

</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsOverlay" onclick="if(event.target===this) closeSettings()">
  <div class="modal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="icon-btn" onclick="closeSettings()" aria-label="Close settings">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="section">
      <div class="field-label">Theme</div>
      <button onclick="toggleDarkMode()">Toggle Theme</button>
    </div>

    <div class="section">
      <div class="field-label">Language</div>
      <select id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ja">日本語</option>
      </select>
    </div>
  </div>
</div>

<script>
let ws;
let manualDisconnect = false;
let participants = new Map(); // name -> { stats, role, skills }

/* ORIGINAL CHAT LOGIC (UNCHANGED) */
function connect() {
  const channel = document.getElementById("channelInput").value.trim().toLowerCase();
  if (!channel) return;

  // Close any existing connection first — otherwise reconnecting (or
  // double-clicking Connect) leaves two sockets open, and every message
  // gets rendered twice, once per socket.
  if (ws) {
    ws.onclose = null; // don't let the old socket's onclose overwrite our new status text
    ws.close();
    ws = null;
  }
  manualDisconnect = false;

  const chatBox = document.getElementById("chat");
  document.getElementById("statusText").textContent = "connecting to #" + channel + "…";

  ws = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

  ws.onopen = () => {
    ws.send("CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership");
    ws.send("NICK justinfan" + Math.floor(Math.random() * 100000));
    ws.send("JOIN #" + channel);
    document.getElementById("statusText").textContent = "connected — #" + channel;
  };

  ws.onclose = () => {
    if (!manualDisconnect) {
      document.getElementById("statusText").textContent = "disconnected (connection dropped)";
    }
    manualDisconnect = false;
  };

  ws.onmessage = (event) => {
    // Twitch can pack multiple IRC lines into one WebSocket message,
    // separated by CRLF — split them out and handle each individually.
    const lines = event.data.split("\r\n").filter(line => line.length > 0);

    for (const line of lines) {

      // Twitch periodically sends PING; we must reply with PONG or it
      // will drop the connection after a timeout.
      if (line.startsWith("PING")) {
        ws.send("PONG :tmi.twitch.tv");
        continue;
      }

      if (!line.includes("PRIVMSG")) continue;

      const userMatch = line.match(/display-name=([^;]+)/);
      const textMatch = line.match(/PRIVMSG #[^ ]+ :(.*)/);

      const username = userMatch ? userMatch[1] : "Unknown";
      const text = textMatch ? textMatch[1] : "";

      const cleanedText = text.replace(/\u0001/g, "").replace(/^ACTION\s+/, "").trim();

      if (cleanedText.toUpperCase().includes("[KUKORO]")) {

        const cleaned = cleanedText
          .replace(/\[KUKORO\]/i, "")
          .trim();

        const div = document.createElement("div");
        div.className = "msg";

        const parsed = parseKukoroMessage(cleaned);
        const restText = cleaned.slice(parsed.name.length);

        div.innerHTML =
          `<span class="chat-name">${escapeHtml(parsed.name)}</span>` +
          `<span class="text">${escapeHtml(restText)}</span>`;

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;

        upsertParticipant(parsed);
      }
    }
  };
}

function parseKukoroMessage(text) {
  // Example: DAMR66 (Lv. 18, Df. 15%, Crit. 20%, Agi. 15%) > 🗡️ Rogue
  // [ skill one ] and [ skill two ].
  const nameMatch = text.match(/^(\S+)/);
  const name = nameMatch ? nameMatch[1] : "Unknown";

  const statsMatch = text.match(/\(([^)]*)\)/);
  const stats = statsMatch ? statsMatch[1].trim() : "";

  // Role sits between the stats parentheses and the first skill bracket,
  // after a ">" marker — but a player may have no role at all.
  let role = "";
  const afterStatsIndex = statsMatch ? statsMatch.index + statsMatch[0].length : name.length;
  const firstBracketIndex = text.indexOf("[");
  if (firstBracketIndex > afterStatsIndex) {
    let segment = text.slice(afterStatsIndex, firstBracketIndex).trim();
    if (segment.startsWith(">")) {
      segment = segment.slice(1).trim();
    }
    role = segment;
  }

  const skills = [];
  const skillRegex = /\[\s*([^\]]*?)\s*\]/g;
  let m;
  while ((m = skillRegex.exec(text)) !== null) {
    skills.push(m[1].trim());
  }

  return { name, stats, role, skills };
}

function upsertParticipant(parsed) {
  participants.set(parsed.name, {
    stats: parsed.stats,
    role: parsed.role,
    skills: parsed.skills
  });
  renderBoard();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function disconnect() {
  if (!ws) {
    document.getElementById("statusText").textContent = "disconnected";
    return;
  }
  manualDisconnect = true;
  ws.close();
  ws = null;
  document.getElementById("statusText").textContent = "disconnected";
}

/* BUTTON FUNCTIONS */
function resetTool() {
  document.getElementById("chat").innerHTML = "";
  participants.clear();
  renderBoard();
}

function switchTab(tab) {
  const chatPanel = document.getElementById("chatPanel");
  const boardPanel = document.getElementById("boardPanel");
  const tabBtnChat = document.getElementById("tabBtnChat");
  const tabBtnBoard = document.getElementById("tabBtnBoard");

  if (tab === "board") {
    chatPanel.classList.remove("active");
    boardPanel.classList.add("active");
    tabBtnChat.classList.remove("active");
    tabBtnBoard.classList.add("active");
  } else {
    boardPanel.classList.remove("active");
    chatPanel.classList.add("active");
    tabBtnBoard.classList.remove("active");
    tabBtnChat.classList.add("active");
  }
}

function addPlayersFromTextarea() {
  const input = document.getElementById("playerDataInput");
  const names = input.value.split("\n").map(n => n.trim()).filter(n => n.length > 0);

  names.forEach(name => {
    if (!participants.has(name)) {
      participants.set(name, { stats: "", role: "", skills: [] });
    }
  });
  renderBoard();

  input.value = "";
  switchTab("board");
}

function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  const sortedNames = Array.from(participants.keys()).sort((a, b) => a.localeCompare(b));

  sortedNames.forEach(name => {
    const data = participants.get(name);
    const row = document.createElement("div");
    row.className = "player-row";

    const skillsHtml = data.skills.length
      ? data.skills.map((s, i) => `<span class="skill-num">${i + 1}.</span>${escapeHtml(s)}`).join("<br>")
      : "—";

    row.innerHTML = `
      <div class="player-name">${escapeHtml(name)}</div>
      <div class="player-stats">${escapeHtml(data.stats) || "—"}</div>
      <div class="player-role">${escapeHtml(data.role) || "—"}</div>
      <div class="player-skills">${skillsHtml}</div>
    `;

    board.appendChild(row);
  });
}

function openSettings() {
  document.getElementById("settingsOverlay").classList.add("open");
}

function closeSettings() {
  document.getElementById("settingsOverlay").classList.remove("open");
}

function changeLanguage(lang) {
  // Placeholder — wire this up to real translations when copy is ready.
  alert("Language set to: " + lang + " (translations not yet implemented)");
}

function toggleDarkMode() {
  alert("This tool now ships dark by default — light mode coming soon.");
}

function readMe() {
  alert("Kukoro Dungeon Raid Tool - Read Me placeholder");
}

function setBossRace() {
  alert("Boss Race set (placeholder)");
}

function organizeBy(type) {
  alert("Organize by: " + type);
}

function sortBy(type) {
  alert("Sort by: " + type);
}

</script>

</body>
</html>
