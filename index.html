<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kukoro Dungeon Raid Player Data Tool</title>

<style>
  :root {
    --bg: #0f1117;
    --panel: #161923;
    --panel-2: #1c2030;
    --border: #2a2f3f;
    --text: #e6e8f0;
    --text-dim: #8b90a3;
    --accent: #7c5cff;
    --accent-2: #ff6b6b;
    --success: #35d68f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(124,92,255,0.10), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,107,107,0.08), transparent 40%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
    min-height: 100vh;
  }

  .app {
    width: 100%;
    max-width: 1080px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    display: flex;
    flex-direction: column;
  }

  .title-bar {
    padding: 22px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(180deg, rgba(124,92,255,0.08), transparent);
  }

  .title-bar .mark {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .title-bar h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .title-bar .sub {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'SFMono-Regular', Consolas, monospace;
  }

  .main-area {
    display: flex;
  }

  .sidebar {
    width: 280px;
    padding: 20px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: 760px;
    background: var(--panel);
  }

  .section {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .field-label .value {
    color: var(--text);
    font-weight: 700;
    text-transform: none;
    letter-spacing: 0;
    margin-left: 6px;
  }

  textarea, input {
    display: block;
    width: 100%;
    background: #0e1119;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    margin-bottom: 10px;
  }

  textarea { height: 64px; }

  textarea::placeholder, input::placeholder { color: #565c72; }

  textarea:focus, input:focus, button:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,255,0.25);
  }

  button {
    display: block;
    width: 100%;
    padding: 9px 0;
    background: #232838;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease, border-color 0.15s ease;
    margin-bottom: 8px;
  }

  button:last-child { margin-bottom: 0; }

  button:hover {
    background: #2a3044;
    border-color: #3a4159;
  }

  button:active {
    transform: translateY(1px);
  }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  button.primary:hover {
    background: #6c4cf0;
  }

  button.ghost {
    background: transparent;
    border-color: transparent;
    color: var(--accent);
    font-weight: 600;
  }

  button.ghost:hover {
    background: rgba(124,92,255,0.1);
  }

  button.danger:hover {
    border-color: var(--accent-2);
    color: var(--accent-2);
  }

  .button-row {
    display: flex;
    gap: 8px;
  }

  .button-row button {
    margin-bottom: 0;
  }

  .content {
    flex: 1;
    padding: 20px;
  }

  .chat {
    height: 720px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    background: #0e1119;
  }

  .chat:empty::before {
    content: "No raid messages yet — connect a channel to start listening.";
    color: var(--text-dim);
    font-size: 13px;
  }

  .msg {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: var(--panel-2);
    border: 1px solid var(--border);
  }

  .tag {
    color: var(--success);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.3px;
    font-family: 'SFMono-Regular', Consolas, monospace;
  }

  .name {
    color: var(--accent);
    font-weight: 600;
  }

  .msg .text {
    color: var(--text);
  }

  .footer {
    text-align: center;
    padding: 14px;
    font-size: 12px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
  }

  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  .footer a:hover {
    text-decoration: underline;
  }

  .sidebar::-webkit-scrollbar, .chat::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-thumb, .chat::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
</style>
</head>

<body>

<div class="app">

  <div class="title-bar">
    <div class="mark"></div>
    <h1>Kukoro Dungeon Raid Player Data Tool</h1>
    <div class="sub" id="statusText">disconnected</div>
  </div>

  <div class="main-area">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <div class="section">
        <div class="field-label">Twitch Channel</div>
        <input id="channelInput" type="text" placeholder="channel name">
        <button class="primary" onclick="connect()">Connect Chat</button>
        <div class="button-row">
          <button class="danger" onclick="disconnect()">Disconnect</button>
          <button class="danger" onclick="resetTool()">Clear</button>
        </div>
      </div>

      <div class="section">
        <div class="field-label">Boss Race</div>
        <button onclick="setBossRace()">Set</button>
      </div>

      <div class="section">
        <div class="field-label">Organize by <span class="value">Players</span></div>
        <button onclick="organizeBy('players')">Targets</button>
      </div>

      <div class="section">
        <div class="field-label">Sort by <span class="value">Name</span></div>
        <button onclick="sortBy('name')">Level</button>
      </div>

      <div class="section">
        <div class="field-label">Player Data</div>
        <textarea placeholder="Paste player data here..."></textarea>
        <button class="ghost" style="background:rgba(124,92,255,0.1)">Add Players</button>
      </div>

      <div class="section">
        <button onclick="toggleDarkMode()">Toggle Theme</button>
        <button class="ghost" onclick="readMe()">Read Me</button>
      </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="content">
      <div id="chat" class="chat"></div>
    </div>

  </div>

  <div class="footer">
    See "<a href="#" onclick="readMe(); return false;">Read Me</a>" for Copyright &amp; Permissions.
  </div>

</div>

<script>
let ws;
let manualDisconnect = false;

/* ORIGINAL CHAT LOGIC (UNCHANGED) */
function connect() {
  const channel = document.getElementById("channelInput").value.trim().toLowerCase();
  if (!channel) return;

  // Close any existing connection first — otherwise reconnecting (or
  // double-clicking Connect) leaves two sockets open, and every message
  // gets rendered twice, once per socket.
  if (ws) {
    ws.onclose = null; // don't let the old socket's onclose overwrite our new status text
    ws.close();
    ws = null;
  }
  manualDisconnect = false;

  const chatBox = document.getElementById("chat");
  chatBox.innerHTML = "";
  document.getElementById("statusText").textContent = "connecting to #" + channel + "…";

  ws = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

  ws.onopen = () => {
    ws.send("CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership");
    ws.send("NICK justinfan" + Math.floor(Math.random() * 100000));
    ws.send("JOIN #" + channel);
    document.getElementById("statusText").textContent = "connected — #" + channel;
  };

  ws.onclose = () => {
    if (!manualDisconnect) {
      document.getElementById("statusText").textContent = "disconnected (connection dropped)";
    }
    manualDisconnect = false;
  };

  ws.onmessage = (event) => {
    // Twitch can pack multiple IRC lines into one WebSocket message,
    // separated by CRLF — split them out and handle each individually.
    const lines = event.data.split("\r\n").filter(line => line.length > 0);

    for (const line of lines) {

      // Twitch periodically sends PING; we must reply with PONG or it
      // will drop the connection after a timeout.
      if (line.startsWith("PING")) {
        ws.send("PONG :tmi.twitch.tv");
        continue;
      }

      if (!line.includes("PRIVMSG")) continue;

      const userMatch = line.match(/display-name=([^;]+)/);
      const textMatch = line.match(/PRIVMSG #[^ ]+ :(.*)/);

      const username = userMatch ? userMatch[1] : "Unknown";
      const text = textMatch ? textMatch[1] : "";

      const cleanedText = text.replace(/\u0001/g, "").trim();

      if (cleanedText.toUpperCase().includes("[KUKORO]")) {

        const cleaned = cleanedText
          .replace(/\[KUKORO\]/i, "")
          .trim();

        const div = document.createElement("div");
        div.className = "msg";

        div.innerHTML = `
          <span class="tag">KUKORO</span>
          <span class="name">${escapeHtml(username)}</span>
          <span class="text">${escapeHtml(cleaned)}</span>
        `;

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }
  };
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function disconnect() {
  if (!ws) {
    document.getElementById("statusText").textContent = "disconnected";
    return;
  }
  manualDisconnect = true;
  ws.close();
  ws = null;
  document.getElementById("statusText").textContent = "disconnected";
}

/* BUTTON FUNCTIONS */
function resetTool() {
  document.getElementById("chat").innerHTML = "";
}

function toggleDarkMode() {
  alert("This tool now ships dark by default — light mode coming soon.");
}

function readMe() {
  alert("Kukoro Dungeon Raid Tool - Read Me placeholder");
}

function setBossRace() {
  alert("Boss Race set (placeholder)");
}

function organizeBy(type) {
  alert("Organize by: " + type);
}

function sortBy(type) {
  alert("Sort by: " + type);
}

</script>

</body>
</html>
