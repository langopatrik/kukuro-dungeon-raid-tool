<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kukoro Dungeon Raid Player Data Tool</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="title-bar">
    <div class="mark"></div>
    <h1 data-i18n="app_title">Kukoro Dungeon Raid Player Data Tool</h1>
    <div class="sub" id="statusText">disconnected</div>
    <button class="icon-btn" onclick="toggleSidebar()" title="Toggle sidebar" aria-label="Toggle sidebar" data-i18n-title="toggle_sidebar_title" data-i18n-aria="toggle_sidebar_title">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="16" rx="2"></rect>
        <line x1="9" y1="4" x2="9" y2="20"></line>
      </svg>
    </button>
    <button class="icon-btn" id="translationBellBtn" onclick="openSettings()" title="Translations" aria-label="Translations" data-i18n-title="translation_bell_title" data-i18n-aria="translation_bell_title">
      <span class="notif-badge" id="bellNotifBadge"></span>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
    </button>
    <button class="icon-btn" onclick="openSettings()" title="Settings" aria-label="Settings" data-i18n-title="settings_title" data-i18n-aria="settings_title">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <div class="main-area">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <div class="section">
        <div class="field-label" data-i18n="twitch_channel_label">Twitch Channel</div>
        <input id="channelInput" type="text" placeholder="channel name" data-i18n-placeholder="channel_placeholder">
        <button class="primary" onclick="connect()" data-i18n="connect_chat_btn">Connect Chat</button>
        <div class="button-row">
          <button class="danger" onclick="disconnect()" data-i18n="disconnect_btn">Disconnect</button>
          <button class="danger" onclick="resetTool()" data-i18n="clear_btn">Clear</button>
        </div>
      </div>

      <div class="section">
        <div class="field-label" data-i18n="boss_type_label">Boss Type</div>
        <select id="bossTypeSelect" onchange="onBossTypeSelectChange()">
          <option value="" data-i18n="select_boss_option">Select a boss...</option>
          <option value="Bat">Bat</option>
          <option value="Cyclops">Cyclops</option>
          <option value="Dragon">Dragon</option>
          <option value="Gargoyle">Gargoyle</option>
          <option value="Goblin">Goblin</option>
          <option value="Gorgon">Gorgon</option>
          <option value="Imp">Imp</option>
          <option value="Lizard">Lizard</option>
          <option value="Minotaur">Minotaur</option>
          <option value="Orc">Orc</option>
          <option value="Shadow">Shadow</option>
          <option value="Skeleton">Skeleton</option>
          <option value="Slime">Slime</option>
          <option value="Spider">Spider</option>
          <option value="Troll">Troll</option>
          <option value="WereWolf">WereWolf</option>
          <option value="Wolf">Wolf</option>
          <option value="Zombie">Zombie</option>
          <option value="__custom__" data-i18n="boss_custom_option">Other (type your own)...</option>
        </select>
        <input id="bossTypeCustomInput" type="text" placeholder="Enter custom boss type" style="display:none;" data-i18n-placeholder="boss_custom_placeholder">

        <div class="field-label" style="margin-top:10px;" data-i18n="dungeon_level_label">Dungeon Level</div>
        <input id="dungeonLevelInput" type="number" min="1" step="1" placeholder="e.g. 5" data-i18n-placeholder="dungeon_level_placeholder">

        <button onclick="setBossType()" data-i18n="set_btn">Set</button>
      </div>

      <div class="section">
        <div class="field-label" data-i18n="player_data_label">Player Data</div>
        <textarea id="playerDataInput" placeholder="Paste raid messages, one per line..." data-i18n-placeholder="player_data_placeholder"></textarea>
        <button class="ghost" style="background:rgba(124,92,255,0.1)" onclick="addPlayersFromTextarea()" data-i18n="add_players_btn">Add Players</button>

      </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="content">
      <div class="tabs">
        <button class="tab-btn active" id="tabBtnChat" onclick="switchTab('chat')" data-i18n="tab_chat">Chat</button>
        <button class="tab-btn" id="tabBtnBoard" onclick="switchTab('board')" data-i18n="tab_board">Board</button>
      </div>

      <div id="chatPanel" class="panel active">
        <div id="chat" class="chat"></div>
      </div>

      <div id="boardPanel" class="panel">
        <div id="bossTypeDisplay" class="boss-type-display" style="display:none;">
          <span id="bossTypeGroup" style="display:inline-flex; align-items:center; gap:8px;">
            <span class="field-label" style="margin:0;" data-i18n="boss_label">Boss</span>
            <span id="bossTypeValue"></span>
          </span>
          <span id="dungeonLevelDisplay" style="display:none; align-items:center; gap:8px;">
            <span class="field-label" style="margin:0 0 0 10px;" data-i18n="dungeon_level_label">Dungeon Level</span>
            <span id="dungeonLevelValue"></span>
          </span>
        </div>
        <div class="board-header">
          <div class="sort-header" id="sortHeader-name" onclick="toggleSort('name')"><span data-i18n="header_players">Players</span> <span id="playerCount"></span><span class="sort-arrow"></span></div>
          <div class="sort-header" id="sortHeader-level" onclick="toggleSort('level')"><span data-i18n="header_level">Level</span><span class="sort-arrow"></span></div>
          <div data-i18n="header_stats">Stats</div>
          <div class="sort-header" id="sortHeader-role" onclick="toggleSort('role')"><span data-i18n="header_role">Role</span><span class="sort-arrow"></span></div>
          <div class="sort-header" id="sortHeader-focus" onclick="toggleSort('focus')"><span data-i18n="header_focus">Focus</span><span class="sort-arrow"></span></div>
          <div data-i18n="header_skills">Skills</div>
        </div>
        <div id="board" class="board"></div>
      </div>
    </div>

  </div>

  <div class="footer" data-i18n-html="footer_html">
    See "<a href="#" onclick="readMe(); return false;">Read Me</a>" for Copyright &amp; Permissions.
  </div>

</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsOverlay" onclick="if(event.target===this) closeSettings()">
  <div class="modal">
    <div class="modal-header">
      <h2 data-i18n="settings_title">Settings</h2>
      <button class="icon-btn" onclick="closeSettings()" aria-label="Close settings" data-i18n-aria="close_settings_aria">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="section">
      <div class="field-label" data-i18n="theme_label">Theme</div>
      <button id="themeToggleBtn" onclick="toggleDarkMode()">Toggle Theme</button>
    </div>

    <div class="section">
      <div class="field-label" data-i18n="board_text_log_label">Board Text (for translation)</div>
      <button id="exportBoardTextBtn" onclick="exportBoardTextLog()">
        <span data-i18n="export_board_text_btn">Export Board Text</span><span class="export-badge" id="exportBadge" style="display:none;"></span>
      </button>
    </div>

    <div class="section">
      <div class="field-label" data-i18n="language_label">Language</div>
      <select id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ja">日本語</option>
      </select>
    </div>
  </div>
</div>

<script src="patterns.js"></script>
<script src="script.js"></script>

</body>
</html>
