<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kukoro Dungeon Raid Tool</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0e0e10;
      color: white;
    }

    header {
      padding: 10px;
      background: #18181b;
      text-align: center;
      font-weight: bold;
    }

    .controls {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #1f1f23;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      background: #9146ff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #7a3dd6;
    }

    #chat {
      height: calc(100vh - 110px);
      overflow-y: auto;
      padding: 10px;
      font-size: 14px;
    }

    .msg {
      margin-bottom: 6px;
      padding: 6px;
      border-bottom: 1px solid #2a2a2a;
    }

    .name {
      color: #9146ff;
      font-weight: bold;
    }

    .tag {
      color: #00ff99;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  🧙 Kukoro Dungeon Raid Tool (Filtered Chat Mode)
</header>

<div class="controls">
  <input id="channelInput" placeholder="Enter Twitch channel (e.g. ninja)" />
  <button onclick="connect()">Connect</button>
</div>

<div id="chat"></div>

<script>
let ws;

function connect() {
  const channel = document.getElementById("channelInput").value.trim().toLowerCase();
  if (!channel) return;

  const chatBox = document.getElementById("chat");
  chatBox.innerHTML = "";

  ws = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

  ws.onopen = () => {
    ws.send("CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership");
    ws.send("NICK justinfan" + Math.floor(Math.random() * 100000));
    ws.send("JOIN #" + channel);
  };

  ws.onmessage = (event) => {
    const msg = event.data;

    if (msg.includes("PRIVMSG")) {

      const userMatch = msg.match(/display-name=([^;]+)/);
      const textMatch = msg.match(/PRIVMSG #[^ ]+ :(.*)/);

      const username = userMatch ? userMatch[1] : "Unknown";
      const text = textMatch ? textMatch[1] : "";

      // ✅ FILTER: only show messages starting with [KUKORO]
      if (text.startsWith("[KUKORO]")) {

        const cleaned = text.replace("[KUKORO]", "").trim();

        const div = document.createElement("div");
        div.className = "msg";

        div.innerHTML = `
          <span class="tag">[KUKORO]</span>
          <span class="name"> ${username}</span>: ${cleaned}
        `;

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }
  };
}

document.getElementById("channelInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") connect();
});
</script>

</body>
</html>
